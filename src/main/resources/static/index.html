<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>API Rate Limiter — NOC Terminal</title>
<style>
  :root {
    --bg-deep: #06060c;
    --bg-panel: #0c0d16;
    --border: #1e2240;
    --cyan: #00e5ff;
    --cyan-dim: #006880;
    --magenta: #ff2d95;
    --magenta-dim: #801850;
    --gold: #ffb800;
    --green: #00ff88;
    --red: #ff3355;
    --text: #c8ccd8;
    --text-dim: #5c6078;
    --font-mono: 'Cascadia Code', 'Fira Code', 'Consolas', 'Courier New', monospace;
    --font-ui: 'Segoe UI', system-ui, sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-ui);
    background: var(--bg-deep);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ===== 粒子画布背景 ===== */
  #particleCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* ===== 扫描线叠加 ===== */
  .scanlines {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    z-index: 1;
    pointer-events: none;
  }

  /* ===== 主容器 ===== */
  .container {
    position: relative;
    z-index: 2;
    max-width: 820px;
    margin: 0 auto;
    padding: 36px 20px 60px;
  }

  /* ===== 头部 ===== */
  .header {
    text-align: center;
    margin-bottom: 32px;
    position: relative;
  }
  .header .badge {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--cyan);
    border: 1px solid var(--cyan-dim);
    padding: 4px 14px;
    border-radius: 3px;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .header h1 {
    font-family: var(--font-mono);
    font-size: 2.2rem;
    font-weight: 700;
    letter-spacing: 2px;
    color: #fff;
    text-shadow: 0 0 60px rgba(0,229,255,0.3);
    margin-bottom: 6px;
  }
  .header h1 .accent { color: var(--cyan); }
  .header .subtitle {
    font-family: var(--font-mono);
    font-size: 0.8rem;
    color: var(--text-dim);
    letter-spacing: 2px;
  }
  .header .subtitle .blink {
    animation: blink 1s step-end infinite;
    color: var(--green);
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* ===== 状态卡片 ===== */
  .cards {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 16px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
  }
  .card.rate-card::before { background: var(--cyan); }
  .card.cap-card::before  { background: var(--magenta); }
  .card.rem-card::before  { background: var(--gold); }
  .card .label {
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .card .value {
    font-family: var(--font-mono);
    font-size: 2.5rem;
    font-weight: 700;
    transition: all 0.3s;
    position: relative;
  }
  .card .value.rate    { color: var(--cyan); text-shadow: 0 0 30px rgba(0,229,255,0.4); }
  .card .value.capacity{ color: var(--magenta); text-shadow: 0 0 30px rgba(255,45,149,0.4); }
  .card .value.remaining{ color: var(--gold); text-shadow: 0 0 30px rgba(255,184,0,0.4); }
  .card .value.remaining.low {
    color: var(--red);
    text-shadow: 0 0 30px rgba(255,51,85,0.6);
    animation: dangerPulse 0.5s infinite;
  }
  @keyframes dangerPulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  /* 数字跳动 */
  .card .value.pop { animation: numPop 0.3s ease; }
  @keyframes numPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.25); }
    100% { transform: scale(1); }
  }

  /* ===== 令牌桶能量槽 ===== */
  .bucket-visual {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 18px 22px;
    margin-bottom: 24px;
    position: relative;
  }
  .bucket-visual .header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }
  .bucket-visual h3 {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .bucket-visual .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    transition: all 0.3s;
  }
  .bucket-visual .status-dot.draining { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .bucket-visual .status-dot.empty { background: var(--red); box-shadow: 0 0 8px var(--red); }

  .bucket-shell {
    height: 36px;
    background: #0a0a16;
    border: 1px solid var(--border);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
  }
  /* 网格线背景 */
  .bucket-shell .grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px),
      linear-gradient(0deg, rgba(0,229,255,0.04) 1px, transparent 1px);
    background-size: 20px 100%;
    z-index: 1;
  }
  .bucket-fill {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    background: linear-gradient(90deg, var(--cyan-dim), var(--cyan), var(--magenta));
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 2;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.3);
  }
  .bucket-fill::after {
    content: '';
    position: absolute;
    left: 0; top: 6px;
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.25);
    border-radius: 2px;
  }
  .bucket-fill.low-fill {
    background: linear-gradient(90deg, #801020, var(--red));
  }
  /* 桶内气泡 */
  .bubbles {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    animation: bubbleUp 2s infinite;
  }
  @keyframes bubbleUp {
    0% { transform: translateY(0); opacity: 0.6; }
    100% { transform: translateY(-30px); opacity: 0; }
  }
  .bucket-labels {
    display: flex;
    justify-content: space-between;
    margin-top: 8px;
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--text-dim);
  }
  .bucket-labels .mid {
    color: var(--cyan);
    font-weight: 600;
  }

  /* ===== 按钮 ===== */
  .actions {
    display: flex;
    gap: 10px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  button {
    flex: 1;
    min-width: 120px;
    padding: 13px 20px;
    border-radius: 4px;
    font-family: var(--font-mono);
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: 1px;
    cursor: pointer;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    color: var(--text);
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  button:hover { border-color: var(--cyan-dim); }
  button:active { transform: scale(0.97); }
  /* 波纹 */
  button .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255,255,255,0.15);
    transform: scale(0);
    animation: ripple 0.6s ease-out;
    pointer-events: none;
  }
  @keyframes ripple {
    to { transform: scale(4); opacity: 0; }
  }
  button.primary {
    background: transparent;
    border-color: var(--cyan);
    color: var(--cyan);
    box-shadow: 0 0 20px rgba(0,229,255,0.1), inset 0 0 20px rgba(0,229,255,0.05);
  }
  button.primary:hover {
    background: rgba(0,229,255,0.08);
    box-shadow: 0 0 30px rgba(0,229,255,0.2), inset 0 0 30px rgba(0,229,255,0.08);
  }
  button.flood {
    background: transparent;
    border-color: var(--red);
    color: var(--red);
    animation: floodGlow 1.5s infinite;
  }
  button.flood:hover { background: rgba(255,51,85,0.08); }
  @keyframes floodGlow {
    0%, 100% { box-shadow: 0 0 5px rgba(255,51,85,0.2); }
    50% { box-shadow: 0 0 25px rgba(255,51,85,0.5); }
  }
  button.danger {
    background: rgba(255,51,85,0.15);
    border-color: var(--red);
    color: #fff;
    animation: dangerFlash 0.5s infinite;
  }
  @keyframes dangerFlash {
    0%, 100% { box-shadow: 0 0 5px rgba(255,51,85,0.3); }
    50% { box-shadow: 0 0 30px rgba(255,51,85,0.7); }
  }

  /* ===== 屏幕闪红（429时触发） ===== */
  .screen-flash {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(255,51,85,0.15), transparent 70%);
    animation: flashIn 0.15s ease-out forwards;
  }
  @keyframes flashIn {
    0% { opacity: 1; }
    100% { opacity: 0; }
  }
  /* 绿色脉冲（成功时小闪） */
  .screen-pulse {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    background: radial-gradient(ellipse at center, rgba(0,255,136,0.06), transparent 70%);
    animation: flashIn 0.3s ease-out forwards;
  }

  /* ===== Token掉落粒子 ===== */
  .token-particle {
    position: fixed;
    z-index: 20;
    pointer-events: none;
    font-size: 1.2rem;
    animation: tokenDrop 1s ease-in forwards;
  }
  @keyframes tokenDrop {
    0% { transform: translateY(-40px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* ===== 请求日志 ===== */
  .log-panel {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .log-panel .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
  }
  .log-panel .log-header h3 {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    letter-spacing: 2px;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  .log-panel .log-header .count {
    font-family: var(--font-mono);
    font-size: 0.7rem;
    color: var(--cyan);
  }
  .log-list {
    max-height: 340px;
    overflow-y: auto;
    scroll-behavior: smooth;
  }
  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .log-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 18px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    border-bottom: 1px solid rgba(30,34,64,0.5);
    animation: logSlide 0.25s ease;
    position: relative;
  }
  @keyframes logSlide {
    from { opacity: 0; transform: translateX(-20px); background: rgba(0,229,255,0.06); }
    to { opacity: 1; transform: translateX(0); background: transparent; }
  }
  .log-item.success { border-left: 2px solid var(--green); }
  .log-item.error   { border-left: 2px solid var(--red); }
  .log-badge {
    padding: 2px 8px;
    border-radius: 3px;
    font-size: 0.65rem;
    font-weight: 700;
    min-width: 36px;
    text-align: center;
    letter-spacing: 1px;
  }
  .log-badge.ok  { background: rgba(0,255,136,0.12); color: var(--green); }
  .log-badge.err { background: rgba(255,51,85,0.12); color: var(--red); }
  .log-time { color: var(--text-dim); min-width: 65px; font-size: 0.7rem; }
  .log-msg { flex: 1; color: var(--text); font-size: 0.72rem; }
  .log-item.error .log-msg { color: var(--red); }
  .log-meta { color: var(--text-dim); font-size: 0.7rem; text-align: right; }
  .log-meta .highlight { color: var(--gold); font-weight: 600; }

  .empty-log {
    padding: 50px;
    text-align: center;
    color: var(--text-dim);
    font-family: var(--font-mono);
    font-size: 0.75rem;
    letter-spacing: 1px;
  }
  .empty-log .cursor { animation: blink 1s step-end infinite; }

  /* ===== 响应式 ===== */
  @media (max-width: 640px) {
    .cards { grid-template-columns: 1fr; gap: 8px; }
    .actions { flex-direction: column; }
    .header h1 { font-size: 1.5rem; }
  }
</style>
</head>
<body>

<!-- 粒子背景 -->
<canvas id="particleCanvas"></canvas>
<div class="scanlines"></div>

<div class="container">

  <!-- 头部 -->
  <div class="header">
    <div class="badge">● SYSTEM ONLINE</div>
    <h1>RATE<span class="accent">_</span>LIMITER</h1>
    <div class="subtitle">TOKEN BUCKET MONITOR <span class="blink">█</span></div>
  </div>

  <!-- 状态卡片 -->
  <div class="cards">
    <div class="card rate-card">
      <div class="label">RATE /s</div>
      <div class="value rate" id="rateDisplay">2</div>
    </div>
    <div class="card cap-card">
      <div class="label">CAPACITY</div>
      <div class="value capacity" id="capacityDisplay">10</div>
    </div>
    <div class="card rem-card">
      <div class="label">TOKENS</div>
      <div class="value remaining" id="remainingDisplay">10</div>
    </div>
  </div>

  <!-- 令牌桶能量槽 -->
  <div class="bucket-visual">
    <div class="header-row">
      <h3>TOKEN RESERVOIR</h3>
      <div class="status-dot" id="statusDot"></div>
    </div>
    <div class="bucket-shell">
      <div class="grid"></div>
      <div class="bucket-fill" id="bucketFill" style="width: 100%;"></div>
      <div class="bubbles" id="bubbles"></div>
    </div>
    <div class="bucket-labels">
      <span>0</span>
      <span class="mid" id="bucketLabel">10 / 10</span>
      <span id="bucketMax">10</span>
    </div>
  </div>

  <!-- 按钮 -->
  <div class="actions">
    <button class="primary" id="btnSend" onclick="sendRequest('/api/limited')">▶ SEND REQUEST</button>
    <button id="btnHello" onclick="sendRequest('/api/hello')">◆ PING /HELLO</button>
    <button class="flood" id="floodBtn" onclick="toggleFlood()">⚡ STRESS TEST</button>
  </div>

  <!-- 请求日志 -->
  <div class="log-panel">
    <div class="log-header">
      <h3>REQUEST LOG</h3>
      <span class="count" id="logCount">0 entries</span>
    </div>
    <div class="log-list" id="logList">
      <div class="empty-log">AWAITING INPUT<span class="cursor">_</span></div>
    </div>
  </div>

</div>

<script>
/* ================================================================
   粒子背景系统 — 数据包网络拓扑
   ================================================================ */
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
let particles = [];
const PARTICLE_COUNT = 70;

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() {
    this.reset();
    this.y = Math.random() * canvas.height; // 初始随机分布
  }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = -10;
    this.vx = (Math.random() - 0.5) * 0.4;
    this.vy = Math.random() * 0.6 + 0.2;
    this.size = Math.random() * 1.8 + 0.6;
    this.opacity = Math.random() * 0.5 + 0.2;
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.y > canvas.height + 10 || this.x < -10 || this.x > canvas.width + 10) {
      this.reset();
      this.y = -10;
    }
  }
  draw(ctx) {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(0,229,255,${this.opacity})`;
    ctx.fill();
  }
}

// 初始化粒子
for (let i = 0; i < PARTICLE_COUNT; i++) {
  const p = new Particle();
  p.y = Math.random() * canvas.height;
  particles.push(p);
}

function drawConnections(ctx, particles) {
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < 120) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(0,229,255,${0.06 * (1 - dist / 120)})`;
        ctx.lineWidth = 0.5;
        ctx.stroke();
      }
    }
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(ctx); });
  drawConnections(ctx, particles);
  requestAnimationFrame(animateParticles);
}
animateParticles();

/* ================================================================
   令牌桶气泡动画
   ================================================================ */
const bubblesContainer = document.getElementById('bubbles');
function spawnBubble() {
  if (bubblesContainer.children.length > 6) return;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  const size = Math.random() * 4 + 2;
  bubble.style.width = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left = Math.random() * 95 + '%';
  bubble.style.bottom = '4px';
  bubble.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
  bubblesContainer.appendChild(bubble);
  setTimeout(() => bubble.remove(), 2500);
}
setInterval(spawnBubble, 600);

/* ================================================================
   核心功能
   ================================================================ */
const BASE = window.location.origin;
const logList = document.getElementById('logList');
const remainingDisplay = document.getElementById('remainingDisplay');
const bucketFill = document.getElementById('bucketFill');
const bucketLabel = document.getElementById('bucketLabel');
const bucketMax = document.getElementById('bucketMax');
const statusDot = document.getElementById('statusDot');
const logCount = document.getElementById('logCount');
let floodInterval = null;
let totalLogs = 0;
let prevRemaining = null;

function sendRequest(path) {
  const start = performance.now();
  fetch(BASE + path)
    .then(res => {
      const latency = Math.round(performance.now() - start);
      const remaining = res.headers.get('X-RateLimit-Remaining');
      const limit = res.headers.get('X-RateLimit-Limit');
      return res.text().then(text => ({ res, text, latency, remaining, limit }));
    })
    .then(({ res, text, latency, remaining, limit }) => {
      if (res.ok) {
        addLog('success', res.status, text, remaining, latency);
        if (path === '/api/limited') spawnScreenPulse();
      } else if (res.status === 429) {
        const reset = res.headers.get('X-RateLimit-Reset') || '?';
        addLog('error', res.status, 'RATE LIMITED — retry in ' + reset + 's', '0', latency);
        spawnScreenFlash();
        spawnTokenParticles(5);
      } else {
        addLog('error', res.status, 'UNEXPECTED', remaining, latency);
      }

      if (limit) {
        document.getElementById('capacityDisplay').textContent = limit;
        bucketMax.textContent = limit;
        const rem = parseInt(remaining) || 0;
        const cap = parseInt(limit) || 10;
        updateBucket(rem, cap);
        updateCards(rem);
      }
    })
    .catch(err => {
      addLog('error', 'ERR', 'CONNECTION FAILED', '?', 0);
    });
}

function toggleFlood() {
  const btn = document.getElementById('floodBtn');
  if (floodInterval) {
    clearInterval(floodInterval);
    floodInterval = null;
    btn.textContent = '⚡ STRESS TEST';
    btn.classList.remove('danger');
    btn.classList.add('flood');
  } else {
    btn.textContent = '■ STOP';
    btn.classList.remove('flood');
    btn.classList.add('danger');
    floodInterval = setInterval(() => sendRequest('/api/limited'), 80);
  }
}

function updateBucket(remaining, capacity) {
  const pct = (remaining / capacity) * 100;
  bucketFill.style.width = pct + '%';
  bucketLabel.textContent = remaining + ' / ' + capacity;
  remainingDisplay.textContent = remaining;

  // 能量槽颜色切换
  if (remaining === 0) {
    bucketFill.classList.add('low-fill');
    statusDot.classList.remove('draining');
    statusDot.classList.add('empty');
  } else if (remaining < capacity * 0.3) {
    bucketFill.classList.add('low-fill');
    statusDot.classList.add('draining');
    statusDot.classList.remove('empty');
  } else {
    bucketFill.classList.remove('low-fill');
    statusDot.classList.remove('draining', 'empty');
  }
}

function updateCards(remaining) {
  if (prevRemaining !== null && remaining < prevRemaining) {
    remainingDisplay.classList.remove('pop');
    void remainingDisplay.offsetWidth;
    remainingDisplay.classList.add('pop');
  }
  if (remaining === 0) {
    remainingDisplay.classList.add('low');
  } else {
    remainingDisplay.classList.remove('low');
  }
  prevRemaining = remaining;
}

function addLog(type, status, msg, remaining, latency) {
  const empty = logList.querySelector('.empty-log');
  if (empty) empty.remove();

  totalLogs++;
  logCount.textContent = totalLogs + ' entries';

  const item = document.createElement('div');
  item.className = 'log-item ' + type;

  const badge = document.createElement('span');
  badge.className = 'log-badge ' + (type === 'success' ? 'ok' : 'err');
  badge.textContent = status;

  const time = document.createElement('span');
  time.className = 'log-time';
  time.textContent = new Date().toLocaleTimeString();

  const msgSpan = document.createElement('span');
  msgSpan.className = 'log-msg';
  msgSpan.textContent = msg;

  const meta = document.createElement('span');
  meta.className = 'log-meta';
  meta.innerHTML = latency + 'ms' + (remaining != null ? ' <span class="highlight">' + remaining + '</span>' : '');

  item.appendChild(badge);
  item.appendChild(time);
  item.appendChild(msgSpan);
  item.appendChild(meta);
  logList.prepend(item);

  while (logList.children.length > 120) logList.lastChild.remove();
}

/* ================================================================
   视觉效果
   ================================================================ */

// 429 屏幕泛红
function spawnScreenFlash() {
  const flash = document.createElement('div');
  flash.className = 'screen-flash';
  document.body.appendChild(flash);
  setTimeout(() => flash.remove(), 200);
}

// 成功时绿色微闪
function spawnScreenPulse() {
  const pulse = document.createElement('div');
  pulse.className = 'screen-pulse';
  document.body.appendChild(pulse);
  setTimeout(() => pulse.remove(), 350);
}

// 令牌掉落粒子（从顶部掉金币）
function spawnTokenParticles(count) {
  const icons = ['◆', '◇', '⬡', '○'];
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'token-particle';
      el.textContent = icons[Math.floor(Math.random() * icons.length)];
      el.style.left = (20 + Math.random() * 60) + '%';
      el.style.top = '-20px';
      el.style.color = Math.random() > 0.5 ? '#ff3355' : '#ffb800';
      el.style.animationDuration = (0.8 + Math.random() * 0.8) + 's';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1800);
    }, i * 60);
  }
}

// 按钮波纹
document.querySelectorAll('button').forEach(btn => {
  btn.addEventListener('click', function(e) {
    const ripple = document.createElement('span');
    ripple.className = 'ripple';
    const rect = this.getBoundingClientRect();
    const size = Math.max(rect.width, rect.height);
    ripple.style.width = ripple.style.height = size + 'px';
    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
    this.appendChild(ripple);
    setTimeout(() => ripple.remove(), 600);
  });
});

// 初始加载
(function init() {
  fetch(BASE + '/api/limited')
    .then(res => {
      const limit = res.headers.get('X-RateLimit-Limit');
      const remaining = res.headers.get('X-RateLimit-Remaining');
      if (limit) {
        document.getElementById('capacityDisplay').textContent = limit;
        bucketMax.textContent = limit;
      }
      if (remaining != null) {
        const rem = parseInt(remaining) || 0;
        const cap = parseInt(limit) || 10;
        updateBucket(rem, cap);
        prevRemaining = rem;
      }
    })
    .catch(() => {});
})();
</script>
